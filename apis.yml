apis:
  - aid: aar:aar-parts-supply
    name: AAR Parts Supply
    tags:
      - Aviation
      - Parts Supply
      - Aircraft Parts
      - Aerospace
    humanURL: https://www.aarcorp.com
    properties:
      - url: https://www.aarcorp.com
        type: Documentation
    description: >-
      AAR's parts supply division distributes new and used aircraft and engine parts
      to commercial airlines, MROs, and government customers globally. Shipped and
      received 23 million commercial parts in FY2025 across global platforms.

  - aid: aar:aar-airframe-mro
    name: AAR Airframe MRO
    tags:
      - Aviation
      - MRO
      - Maintenance
      - Repair
      - Overhaul
    humanURL: https://www.aarcorp.com
    properties:
      - url: https://www.aarcorp.com
        type: Documentation
    description: >-
      AAR provides airframe maintenance, repair, and overhaul (MRO) services as the
      leading North American MRO provider. Services cover complete airframe checks,
      structural repairs, modifications, and aircraft painting for commercial operators.

  - aid: aar:aar-component-mro
    name: AAR Component MRO
    tags:
      - Aviation
      - MRO
      - Components
      - Repair
    humanURL: https://www.aarcorp.com
    properties:
      - url: https://www.aarcorp.com
        type: Documentation
    description: >-
      AAR component MRO services provide comprehensive maintenance, repair, and overhaul
      for aircraft components, avionics, landing gear, and accessories for commercial
      and government aviation platforms.

  - aid: aar:aar-trax
    name: AAR Trax Aviation Software
    tags:
      - Aviation
      - Software
      - MRO Software
      - Fleet Management
      - Maintenance Tracking
    humanURL: https://www.aarcorp.com
    properties:
      - url: https://www.aarcorp.com
        type: Documentation
    description: >-
      Trax is AAR's aviation maintenance management software (MMS) for airlines,
      MROs, and cargo operators. Provides integrated fleet management, maintenance
      tracking, inventory management, and compliance management capabilities.

  - aid: aar:aar-aerostrat
    name: AAR Aerostrat
    tags:
      - Aviation
      - Software
      - Supply Chain
      - Parts Management
    humanURL: https://www.aarcorp.com
    properties:
      - url: https://www.aarcorp.com
        type: Documentation
    description: >-
      Aerostrat is AAR's aviation supply chain and parts management software, providing
      inventory optimization, demand forecasting, and procurement automation for
      airlines and MRO providers.

  - aid: aar:aar-airinmar
    name: AAR Airinmar Warranty and Claims
    tags:
      - Aviation

      - Warranty Management
      - Claims Processing
    humanURL: https://www.aarcorp.com
    properties:
      - url: https://www.aarcorp.com
        type: Documentation
    description: >-
      Airinmar is AAR's aviation warranty management and components repair solution,
      providing warranty claim processing, repair order management, and vendor management
      for airlines and MRO organizations.

  - aid: aar:aar-government-services
    name: AAR Government Services
    tags:
      - Aviation
      - Government

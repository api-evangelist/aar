      - Expeditionary
    humanURL: https://www.aarcorp.com
    properties:
      - url: https://www.aarcorp.com
        type: Documentation
    description: >-
      AAR's government services division provides comprehensive maintenance and supply
      chain programs, shelters and sustainment systems, and aircraft parts and services
      to government and defense customers across five continents.

common:
  - type: Website
    url: https://www.aarcorp.com
  - type: Features
    data:
      - name: Aircraft Parts Distribution
        description: >-
          Global distribution of new and used aircraft and engine parts for commercial
          and government aviation platforms with 23 million parts processed annually.
      - name: Airframe MRO
        description: >-
          North America's leading airframe maintenance, repair, and overhaul services
          including full structural checks, modifications, and aircraft painting.
      - name: Component MRO
        description: >-
          Comprehensive component, avionics, and landing gear maintenance and repair
          services for commercial and military aviation.
      - name: Trax MRO Software
        description: >-
          Integrated aviation maintenance management software covering fleet management,
          maintenance tracking, inventory, and regulatory compliance.
      - name: Aerostrat Parts Management
        description: >-
          Aviation supply chain software for inventory optimization, demand forecasting,
          and procurement automation.
      - name: Airinmar Warranty Management
        description: >-
          Warranty claim processing and components repair management software for
          airlines and MRO organizations.
      - name: Government Expeditionary Services
        description: >-
          Defense and government aviation services including maintenance programs,
          shelter systems, and supply chain support in over 20 countries.
  - type: UseCases
    data:
      - name: Commercial Airline MRO
        description: >-
          Commercial airlines outsourcing airframe and component maintenance to
          AAR for cost-effective, FAA/EASA-approved maintenance programs.
      - name: Aviation Parts Sourcing
        description: >-
          Airlines and MROs sourcing new and used aircraft parts through AAR's
          global parts distribution network for aircraft-on-ground (AOG) situations.
      - name: Fleet Management Software
        description: >-
          Airlines and MROs implementing Trax MRO software for end-to-end aircraft
          maintenance management, inventory control, and compliance reporting.
      - name: Government Aircraft Sustainment
        description: >-
          Defense agencies contracting AAR for aircraft maintenance, supply chain,
          and expeditionary sustainment programs in deployed environments.
      - name: Warranty Claims Processing
        description: >-
          Airlines using Airinmar to streamline warranty claim submissions, track
          repair orders, and manage vendor relationships for component warranties.
      - name: Supply Chain Optimization
        description: >-
          MRO organizations using Aerostrat to optimize parts inventory levels,
          reduce carrying costs, and improve procurement efficiency.
  - type: Integrations
    data:
      - name: Airlines and Commercial Operators
        description: >-
          Direct partnerships with major commercial airlines for MRO contracts,
          parts supply, and software implementation.
      - name: Government and Defense Agencies
        description: >-
          Contracts with US and international government defense agencies for aircraft
          sustainment and supply chain services.
      - name: FAA and EASA
        description: >-
          Regulatory approvals and compliance integration with FAA, EASA, and other
          civil aviation authority regulatory frameworks.
      - name: OEM Partnerships
        description: >-
          Authorized maintenance and parts relationships with major aircraft OEMs
          including Boeing, Airbus, and engine manufacturers.

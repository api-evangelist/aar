meters:
  - name: customer_contract
    description: MRO services or software license contract — not a metered API unit.
    unit: contract
    aggregation: count
    dimensions:
      - customer
      - product
principles:
  - name: Visibility
    description: Track integration cost as part of MRO operations spend; AAR does not provide a metered
      API usage feed.
  - name: Allocation
    description: Allocate cost to the fleet operations or maintenance program that owns the AAR contract.
  - name: Optimization
    description: Optimize integration usage by aligning queries with maintenance cycles and using batched
      parts requests where the contract allows.
  - name: Accountability
    description: Maintenance / operations leadership owns the AAR relationship; IT owns runtime. Review
      activity at quarterly fleet reviews.
